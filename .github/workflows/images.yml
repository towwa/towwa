name: Metrics
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit (optional)
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # See action.yml for all options
      - name: 🦑 Personal metrics (left)
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          # Your GitHub token
          plugin_isocalendar: yes
          token: ${{ secrets.METRICS_TOKEN }}
          
      - name: 🦑 Personal metrics (right)
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          filename: metrics.languages.svg
          plugin_languages: yes
          plugin_languages_details: lines, percentage
          # NOTE: "recently-used" removed below because lowlighter/metrics@latest currently
          # throws (RecentAnalyzer: Cannot destructure 'committer' of undefined) when a repo
          # has a commit with a null committer. Re-add ", recently-used" once upstream fixes it.
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_ignored: html, css 
          config_order: languages
          base: false
          token: ${{ secrets.METRICS_TOKEN }}
